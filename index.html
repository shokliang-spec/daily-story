<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>阿桂嬤養生湯飲｜限動圖片產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#16291e;
    --green:#1d3a2a;
    --green-ink:#2b4a36;
    --cream:#f3ead2;
    --cream-soft:#efe4c6;
    --red:#a32a22;
    --gold:#c9a85c;
    --gold-soft:#b9954a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Noto Sans TC',sans-serif;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.018) 0 2px, transparent 2px 14px),
      linear-gradient(180deg,#1a3326,#142619);
    color:var(--cream);
    min-height:100vh;
    padding-bottom:60px;
  }
  header{
    text-align:center;
    padding:26px 16px 14px;
  }
  header h1{
    font-family:'Noto Serif TC',serif;
    font-weight:900;
    font-size:1.45rem;
    letter-spacing:.18em;
    color:var(--cream);
  }
  header .sub{
    margin-top:6px;
    font-size:.78rem;
    letter-spacing:.3em;
    color:var(--gold);
  }
  .divider{
    width:160px;margin:14px auto 0;
    display:flex;align-items:center;gap:10px;
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold-soft));
  }
  .divider::after{background:linear-gradient(90deg,var(--gold-soft),transparent)}
  .divider span{color:var(--gold);font-size:.7rem}

  main{max-width:520px;margin:0 auto;padding:0 14px}

  .panel{
    background:rgba(0,0,0,.22);
    border:1px solid rgba(201,168,92,.35);
    border-radius:14px;
    padding:16px;
    margin-top:16px;
  }
  .panel h2{
    font-family:'Noto Serif TC',serif;
    font-size:.95rem;
    font-weight:700;
    letter-spacing:.25em;
    color:var(--gold);
    margin-bottom:12px;
    display:flex;align-items:center;gap:8px;
  }
  .panel h2::after{content:"";flex:1;height:1px;background:rgba(201,168,92,.25)}

  /* segmented mode toggle */
  .seg{
    display:flex;border:1px solid var(--gold-soft);border-radius:10px;overflow:hidden;
  }
  .seg button{
    flex:1;padding:11px 0;border:0;cursor:pointer;
    background:transparent;color:var(--cream);
    font-family:'Noto Serif TC',serif;font-weight:700;font-size:1rem;letter-spacing:.3em;
    transition:background .15s;
  }
  .seg button.active{background:var(--red);color:var(--cream)}

  label.field{display:block;margin-top:12px;font-size:.8rem;color:#cfc4a2;letter-spacing:.08em}
  input[type="date"],input[type="text"],textarea{
    width:100%;margin-top:6px;
    background:var(--cream);color:#23311f;
    border:1px solid var(--gold-soft);border-radius:9px;
    padding:11px 12px;font-size:1rem;font-family:'Noto Sans TC',sans-serif;
  }
  /* iOS Safari：日期欄位會用內建寬度爆出容器，強制收乾 */
  input[type="date"]{
    -webkit-appearance:none;
    appearance:none;
    display:block;
    min-width:0;
    max-width:100%;
    min-height:48px;
    text-align:left;
  }
  textarea{resize:vertical;min-height:74px;line-height:1.6}
  input:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}

  /* item checkboxes */
  .items{display:flex;flex-direction:column;gap:8px}
  .item{
    display:flex;align-items:center;gap:10px;
    background:rgba(243,234,210,.06);
    border:1px solid rgba(201,168,92,.28);
    border-radius:10px;padding:10px 12px;cursor:pointer;
    transition:background .15s,border-color .15s;
  }
  .item.checked{background:rgba(243,234,210,.14);border-color:var(--gold)}
  .item input{width:19px;height:19px;accent-color:var(--red);flex:none}
  .item .name{
    font-family:'Noto Serif TC',serif;font-weight:700;font-size:1rem;color:var(--cream);
    flex:1;letter-spacing:.05em;
  }
  .badge{
    flex:none;font-size:.66rem;font-weight:700;letter-spacing:.15em;
    padding:3px 7px;border-radius:5px;color:var(--cream);
  }
  .badge.hot{background:var(--red)}
  .badge.nosugar{background:var(--green-ink);border:1px solid var(--gold-soft)}
  .item .price{flex:none;color:var(--gold);font-weight:700;font-size:.92rem}

  .hint{margin-top:10px;font-size:.75rem;color:#a89d7c;line-height:1.7}

  /* preview */
  #previewWrap{
    margin-top:16px;text-align:center;
  }
  #previewImg{
    width:100%;max-width:340px;border-radius:14px;
    border:1px solid rgba(201,168,92,.5);
    box-shadow:0 14px 40px rgba(0,0,0,.5);
    display:block;margin:0 auto;
  }
  .save-tip{margin-top:10px;font-size:.8rem;color:var(--gold);letter-spacing:.05em}

  .btn-dl{
    display:block;width:100%;margin-top:14px;
    padding:15px 0;border:0;border-radius:12px;cursor:pointer;
    background:linear-gradient(180deg,#b8352b,#8f231c);
    color:var(--cream);
    font-family:'Noto Serif TC',serif;font-weight:900;font-size:1.15rem;letter-spacing:.4em;text-indent:.4em;
    box-shadow:0 6px 18px rgba(0,0,0,.4), inset 0 0 0 1px rgba(201,168,92,.6);
  }
  .btn-dl:active{transform:translateY(1px)}

  .warn{
    display:none;margin-top:14px;padding:12px 14px;border-radius:10px;
    background:rgba(163,42,34,.18);border:1px solid var(--red);
    color:#f0d9d2;font-size:.82rem;line-height:1.7;
  }
  .warn.show{display:block}

  footer{
    text-align:center;margin-top:34px;
    font-size:.72rem;letter-spacing:.25em;color:#7d8d76;
  }
  .holiday-only{display:none}
  body.mode-holiday .holiday-only{display:block}
  body.mode-holiday .open-only{display:none}
</style>
</head>
<body>

<header>
  <h1>阿桂嬤養生湯飲</h1>
  <div class="sub">IG 限動圖片產生器</div>
  <div class="divider"><span>❖</span></div>
</header>

<main>
  <div class="warn" id="logoWarn">
    ⚠ 找不到 <b>logo.png</b>。請將 logo 圖檔命名為 <b>logo.png</b>，和這個網頁放在同一個資料夾，圖片才會顯示完整商標。
  </div>

  <section class="panel">
    <h2>今日狀態</h2>
    <div class="seg" role="tablist">
      <button id="modeOpen" class="active" type="button">出　攤</button>
      <button id="modeHoliday" type="button">公　休</button>
    </div>

    <label class="field">日期
      <input type="date" id="inpDate">
    </label>

    <div class="open-only">
      <p class="field" style="margin-top:14px">擺攤地點（勾選後可填攤位位置）</p>
      <div class="items" id="locList" style="margin-top:6px"></div>
      <label class="field">補充說明（選填，會顯示在地點下方）
        <input type="text" id="inpNote" placeholder="例：營業到午夜 12 點・賣完為止" value="">
      </label>
    </div>

    <div class="holiday-only">
      <label class="field">公休訊息
        <textarea id="inpHolidayMsg">好好休息，養精蓄銳
我們擇日再相見！</textarea>
      </label>
    </div>
  </section>

  <section class="panel open-only">
    <h2>今日供應品項</h2>
    <div class="items" id="itemList"></div>
    <p class="hint">勾選今天推薦的品項。建議 4～6 款版面最好看；地點勾 2 個以上時，品項建議 4 款以內，字才夠大。</p>
  </section>

  <section id="previewWrap">
    <img id="previewImg" alt="限動圖片預覽">
    <p class="save-tip">📱 手機：長按上方圖片即可儲存到相簿</p>
    <button class="btn-dl" id="btnDownload" type="button">下載圖片</button>
  </section>
</main>

<footer>現點現調 ・ 天然熬煮 ・ 無添加香精</footer>

<canvas id="cv" width="1080" height="1920" style="display:none"></canvas>

<script>
/* ====== 品項資料（要改品名、價格、標籤，改這裡就好） ====== */
const MENU = [
  { name:"傳統酸梅湯",         price:60, badge:"招牌",  checked:true  },
  { name:"冰糖菊花茶",         price:60, badge:"",      checked:true  },
  { name:"菊花涼茶",           price:60, badge:"",      checked:false },
  { name:"青草涼茶",           price:60, badge:"",      checked:true  },
  { name:"陳皮紅茶",           price:60, badge:"",      checked:false },
  { name:"女神補氣蘋果水",     price:60, badge:"",      checked:false },
  { name:"牛蒡枸杞茶",         price:60, badge:"無糖",  checked:true  },
  { name:"黑豆杜仲茶",         price:60, badge:"無糖",  checked:true  },
];
const IG_HANDLE = "@aguima.drinks";
const FOOT_LINE = "現點現調 ・ 天然熬煮 ・ 無添加香精";

/* ====== 色票 ====== */
const C = {
  greenDeep:"#15281d", green:"#1d3a2a", greenInk:"#274532",
  cream:"#f3ead2", creamDeep:"#ead9b4",
  red:"#a32a22", redDeep:"#8c211a",
  gold:"#c9a85c", goldSoft:"#b08e45", inkGreen:"#23402e",
};

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const W = 1080, H = 1920;

let mode = "open";
let logoImg = null, logoReady = false;

/* ---- 載入 logo ---- */
(function loadLogo(){
  const img = new Image();
  img.onload = () => { logoImg = img; logoReady = true; scheduleRender(); };
  img.onerror = () => { document.getElementById("logoWarn").classList.add("show"); scheduleRender(); };
  img.src = "logo.png";
})();

/* ---- 控制項初始化 ---- */
const inpDate = document.getElementById("inpDate");
(function(){
  const t = new Date();
  inpDate.value = t.getFullYear() + "-" + String(t.getMonth()+1).padStart(2,"0") + "-" + String(t.getDate()).padStart(2,"0");
})();

/* ====== 擺攤地點（要新增或改名，改這裡就好） ====== */
const MARKETS = [
  { name:"台南花園夜市", checked:true,  spot:"" },
  { name:"小北夜市",     checked:false, spot:"" },
  { name:"新永華夜市",   checked:false, spot:"" },
  { name:"武聖夜市",     checked:false, spot:"" },
];

const locList = document.getElementById("locList");
MARKETS.forEach((m,i)=>{
  const row = document.createElement("label");
  row.className = "item" + (m.checked ? " checked" : "");
  row.innerHTML = `
    <input type="checkbox" class="loc-chk" data-i="${i}" ${m.checked?"checked":""}>
    <span class="name">${m.name}</span>
    <input type="text" class="loc-spot" data-i="${i}" placeholder="位置（選填）"
      value="${m.spot}" ${m.checked?"":"disabled"}
      style="width:120px;flex:none;margin:0;padding:7px 9px;font-size:.85rem">`;
  locList.appendChild(row);
});
locList.addEventListener("change", e=>{
  if (!e.target.classList.contains("loc-chk")) return;
  const i = +e.target.dataset.i;
  MARKETS[i].checked = e.target.checked;
  const row = e.target.closest(".item");
  row.classList.toggle("checked", e.target.checked);
  row.querySelector(".loc-spot").disabled = !e.target.checked;
  scheduleRender();
});
locList.addEventListener("input", e=>{
  if (!e.target.classList.contains("loc-spot")) return;
  MARKETS[+e.target.dataset.i].spot = e.target.value;
  scheduleRender();
});
/* 避免點到輸入框時誤觸 checkbox */
locList.addEventListener("click", e=>{
  if (e.target.classList.contains("loc-spot")) e.preventDefault();
});

const itemList = document.getElementById("itemList");
MENU.forEach((m,i)=>{
  const row = document.createElement("label");
  row.className = "item" + (m.checked ? " checked" : "");
  row.innerHTML = `
    <input type="checkbox" data-i="${i}" ${m.checked?"checked":""}>
    <span class="name">${m.name}</span>
    ${m.badge ? `<span class="badge ${m.badge==="招牌"?"hot":"nosugar"}">${m.badge}</span>` : ""}
    <span class="price">$${m.price}</span>`;
  itemList.appendChild(row);
});
itemList.addEventListener("change", e=>{
  const i = +e.target.dataset.i;
  MENU[i].checked = e.target.checked;
  e.target.closest(".item").classList.toggle("checked", e.target.checked);
  scheduleRender();
});

document.getElementById("modeOpen").addEventListener("click", ()=>setMode("open"));
document.getElementById("modeHoliday").addEventListener("click", ()=>setMode("holiday"));
function setMode(m){
  mode = m;
  document.body.classList.toggle("mode-holiday", m==="holiday");
  document.getElementById("modeOpen").classList.toggle("active", m==="open");
  document.getElementById("modeHoliday").classList.toggle("active", m==="holiday");
  scheduleRender();
}

["inpDate","inpNote","inpHolidayMsg"].forEach(id=>{
  document.getElementById(id).addEventListener("input", scheduleRender);
});

/* ---- 繪圖小工具 ---- */
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function serif(weight,size){ return `${weight} ${size}px "Noto Serif TC", serif`; }
function fitSize(text, weight, baseSize, maxWidth){
  let s = baseSize;
  ctx.font = serif(weight, s);
  while (ctx.measureText(text).width > maxWidth && s > 20){
    s -= 2; ctx.font = serif(weight, s);
  }
  return s;
}
function wrapLines(text, weight, size, maxWidth){
  const out = [];
  for (const raw of text.split("\n")){
    let line = "";
    ctx.font = serif(weight, size);
    for (const ch of raw){
      if (ctx.measureText(line + ch).width > maxWidth && line){ out.push(line); line = ch; }
      else line += ch;
    }
    out.push(line);
  }
  return out;
}

/* 背景斜紋 */
let stripePattern = null;
function getStripes(){
  if (stripePattern) return stripePattern;
  const p = document.createElement("canvas"); p.width = 28; p.height = 28;
  const c = p.getContext("2d");
  c.strokeStyle = "rgba(255,255,255,0.030)"; c.lineWidth = 3;
  c.beginPath();
  for (let i=-28;i<=56;i+=14){ c.moveTo(i,28); c.lineTo(i+28,0); }
  c.stroke();
  stripePattern = ctx.createPattern(p,"repeat");
  return stripePattern;
}
/* 仿舊紙斑點（固定亂數，避免每次重繪閃動） */
function speckle(x,y,w,h,seed){
  let s = seed;
  const rnd = ()=> (s = (s*16807)%2147483647) / 2147483647;
  ctx.save();
  ctx.fillStyle = "rgba(90,70,30,0.10)";
  const n = Math.floor(w*h/3800);
  for(let i=0;i<n;i++){
    ctx.beginPath();
    ctx.arc(x+rnd()*w, y+rnd()*h, rnd()*1.7+0.4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

const WD = ["日","一","二","三","四","五","六"];
function dateText(){
  const v = inpDate.value;
  if(!v) return "";
  const d = new Date(v + "T00:00:00");
  return `${d.getMonth()+1} 月 ${d.getDate()} 日（星期${WD[d.getDay()]}）`;
}

/* ---- 共用區塊 ---- */
function drawBase(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#214233"); g.addColorStop(.5,C.green); g.addColorStop(1,"#142519");
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = getStripes(); ctx.fillRect(0,0,W,H);
  /* 金色細框 */
  ctx.strokeStyle = "rgba(201,168,92,0.55)"; ctx.lineWidth = 3;
  rr(34,34,W-68,H-68,26); ctx.stroke();
  ctx.strokeStyle = "rgba(201,168,92,0.22)"; ctx.lineWidth = 1.5;
  rr(48,48,W-96,H-96,20); ctx.stroke();
}

function drawLogo(cy, r){
  const cx = W/2;
  ctx.save();
  /* 光暈 */
  ctx.shadowColor = "rgba(0,0,0,0.55)"; ctx.shadowBlur = 40; ctx.shadowOffsetY = 14;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle = C.cream; ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
  if (logoReady){
    ctx.drawImage(logoImg, cx-r, cy-r, r*2, r*2);
  } else {
    ctx.fillStyle = C.cream; ctx.fillRect(cx-r,cy-r,r*2,r*2);
    ctx.fillStyle = C.greenInk; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font = serif(900, r*0.42);
    ctx.fillText("阿桂嬤", cx, cy - r*0.18);
    ctx.font = serif(700, r*0.2);
    ctx.fillText("養生湯飲", cx, cy + r*0.3);
  }
  ctx.restore();
  /* 金環 */
  ctx.strokeStyle = C.gold; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(cx,cy,r+4,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle = "rgba(201,168,92,0.45)"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx,cy,r+12,0,Math.PI*2); ctx.stroke();
}

function drawDivider(y, halfW){
  const cx = W/2;
  ctx.strokeStyle = "rgba(201,168,92,0.7)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx-halfW,y); ctx.lineTo(cx-26,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+26,y); ctx.lineTo(cx+halfW,y); ctx.stroke();
  ctx.save();
  ctx.translate(cx,y); ctx.rotate(Math.PI/4);
  ctx.fillStyle = C.gold; ctx.fillRect(-9,-9,18,18);
  ctx.restore();
}

/* 紅底印章橫匾 */
function sealBanner(text, cy, fontSize){
  const cx = W/2;
  ctx.font = serif(900, fontSize);
  const tw = ctx.measureText(text).width;
  const padX = 70, bw = tw + padX*2, bh = fontSize + 76;
  const x = cx - bw/2, y = cy - bh/2;
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowBlur = 24; ctx.shadowOffsetY = 8;
  const g = ctx.createLinearGradient(0,y,0,y+bh);
  g.addColorStop(0,"#b13328"); g.addColorStop(1,C.redDeep);
  ctx.fillStyle = g; rr(x,y,bw,bh,22); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = C.gold; ctx.lineWidth = 3;
  rr(x+8,y+8,bw-16,bh-16,15); ctx.stroke();
  ctx.fillStyle = C.cream; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = serif(900, fontSize);
  ctx.fillText(text, cx, cy + 4);
  return bh;
}

function drawFooter(){
  const cx = W/2;
  /* 標語膠囊 */
  ctx.font = serif(700, 33);
  const tw = ctx.measureText(FOOT_LINE).width;
  const bw = tw + 90, bh = 74, y = H - 200;
  ctx.strokeStyle = C.gold; ctx.lineWidth = 2.5;
  rr(cx-bw/2, y, bw, bh, bh/2); ctx.stroke();
  ctx.fillStyle = C.gold; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(FOOT_LINE, cx, y + bh/2 + 2);
  /* IG */
  ctx.font = `500 30px "Noto Sans TC", sans-serif`;
  ctx.fillStyle = "rgba(243,234,210,0.85)";
  ctx.fillText("Instagram " + IG_HANDLE, cx, H - 86);
}

/* ---- 出攤版面 ---- */
function renderOpen(){
  drawBase();
  drawLogo(258, 188);

  const cx = W/2;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";

  /* 英文副標 */
  ctx.font = `italic 600 30px "Noto Serif TC", serif`;
  ctx.fillStyle = C.gold;
  ctx.fillText("Grandma A-Gui's Herbal Drinks", cx, 492);

  drawDivider(540, 230);

  /* 日期 */
  ctx.font = serif(600, 36);
  ctx.fillStyle = "rgba(243,234,210,0.9)";
  ctx.fillText(dateText(), cx, 600);

  /* 今日出攤 */
  sealBanner("今 日 出 攤", 702, 84);

  /* 地點米黃匾（支援多攤勾選） */
  const locs = MARKETS.filter(m=>m.checked)
                      .map(m=>({place:m.name, spot:m.spot.trim()}));
  if (!locs.length) locs.push({place:"台南花園夜市", spot:""});
  const note = document.getElementById("inpNote").value.trim();

  const two = locs.length > 1;
  const many = locs.length > 2;
  const placeFS = many ? 48 : (two ? 56 : 64), spotFS = many ? 38 : (two ? 42 : 48);
  const placeLH = many ? 58 : (two ? 66 : 76), spotLH = many ? 50 : (two ? 56 : 64);
  const divGap = many ? 38 : 50, noteLH = 56;

  const px = 110, pw = W - px*2;
  let ph = 50 + 46;
  locs.forEach(l => { ph += placeLH + (l.spot ? spotLH : 0); });
  ph += (locs.length-1) * divGap;
  if (note) ph += noteLH + 6;
  ph = Math.max(ph, 156);
  const py = 796;
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,0.35)"; ctx.shadowBlur=20; ctx.shadowOffsetY=7;
  ctx.fillStyle = C.cream; rr(px,py,pw,ph,20); ctx.fill();
  ctx.restore();
  speckle(px,py,pw,ph,12345);
  ctx.strokeStyle = C.red; ctx.lineWidth = 3; rr(px,py,pw,ph,20); ctx.stroke();
  ctx.strokeStyle = "rgba(176,142,69,0.7)"; ctx.lineWidth = 1.5; rr(px+9,py+9,pw-18,ph-18,13); ctx.stroke();

  let ly = py + 50;
  /* 內容總高度若小於卡片，置中微調 */
  let contentH = locs.reduce((a,l)=> a + placeLH + (l.spot?spotLH:0), 0)
               + (locs.length-1)*divGap + (note ? noteLH+6 : 0);
  ly += Math.max(0, (ph - 50 - 46 - contentH) / 2);

  locs.forEach((l, idx)=>{
    ly += placeLH/2;
    const ps = fitSize(l.place, 900, placeFS, pw-90);
    ctx.font = serif(900, ps); ctx.fillStyle = C.inkGreen;
    ctx.fillText(l.place, cx, ly);
    ly += placeLH/2;
    if (l.spot){
      ly += spotLH/2;
      const ss = fitSize(l.spot, 700, spotFS, pw-90);
      ctx.font = serif(700, ss); ctx.fillStyle = C.red;
      ctx.fillText(l.spot, cx, ly);
      ly += spotLH/2;
    }
    if (idx < locs.length-1){
      ly += divGap/2;
      /* 兩攤之間的小分隔 */
      ctx.strokeStyle = "rgba(163,42,34,0.45)"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx-130, ly); ctx.lineTo(cx-22, ly); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+22, ly); ctx.lineTo(cx+130, ly); ctx.stroke();
      ctx.save();
      ctx.translate(cx, ly); ctx.rotate(Math.PI/4);
      ctx.fillStyle = "rgba(163,42,34,0.65)"; ctx.fillRect(-6,-6,12,12);
      ctx.restore();
      ly += divGap/2;
    }
  });
  if (note){
    ly += noteLH/2 + 6;
    const ns = fitSize(note, 600, 34, pw-90);
    ctx.font = serif(600, ns); ctx.fillStyle = "#5c5132";
    ctx.fillText(note, cx, ly);
  }

  /* 品項卡 */
  const items = MENU.filter(m=>m.checked);
  const ix = 90, iw = W - ix*2;
  const iy = py + ph + 36;
  const ih = (H - 240) - iy;
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,0.35)"; ctx.shadowBlur=20; ctx.shadowOffsetY=7;
  ctx.fillStyle = C.cream; rr(ix,iy,iw,ih,22); ctx.fill();
  ctx.restore();
  speckle(ix,iy,iw,ih,54321);
  ctx.strokeStyle = C.gold; ctx.lineWidth = 3.5; rr(ix,iy,iw,ih,22); ctx.stroke();
  ctx.strokeStyle = "rgba(163,42,34,0.55)"; ctx.lineWidth = 1.5; rr(ix+10,iy+10,iw-20,ih-20,14); ctx.stroke();

  /* 卡片標題 */
  const headY = iy + 64;
  ctx.font = serif(900, 44); ctx.fillStyle = C.red;
  const ht = "每 日 推 薦";
  ctx.fillText(ht, cx, headY);
  const htw = ctx.measureText(ht).width;
  ctx.strokeStyle = "rgba(163,42,34,0.5)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ix+58, headY); ctx.lineTo(cx-htw/2-30, headY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+htw/2+30, headY); ctx.lineTo(ix+iw-58, headY); ctx.stroke();

  if (!items.length){
    ctx.font = serif(600, 40); ctx.fillStyle = "#7a6c44";
    ctx.fillText("（請在下方勾選今日品項）", cx, iy + ih/2);
  } else {
    const listTop = headY + 46;
    const listBottom = iy + ih - 44;
    if (listBottom - listTop < items.length * 34){
      ctx.font = serif(600, 36); ctx.fillStyle = "#7a6c44";
      ctx.fillText("（版面不足：請減少品項或地點）", cx, Math.max(headY + 70, iy + ih/2));
      ctx.textAlign = "center";
      drawFooter();
      return;
    }
    const rowH = Math.min(118, (listBottom - listTop) / items.length);
    const startY = listTop + ((listBottom-listTop) - rowH*items.length)/2;
    const nameSize = Math.min(50, rowH*0.56);
    const lx = ix + 64, rxx = ix + iw - 64;

    items.forEach((m,i)=>{
      const ry = startY + rowH*i + rowH/2;
      ctx.textBaseline = "middle";

      /* 標籤 */
      let nx = lx;
      if (m.badge){
        const bs = nameSize*0.52;
        ctx.font = serif(700, bs);
        const bw2 = ctx.measureText(m.badge).width + 26, bh2 = bs + 18;
        const isHot = m.badge === "招牌";
        ctx.fillStyle = isHot ? C.red : C.greenInk;
        rr(nx, ry-bh2/2, bw2, bh2, 7); ctx.fill();
        if (!isHot){ ctx.strokeStyle=C.goldSoft; ctx.lineWidth=1.5; rr(nx,ry-bh2/2,bw2,bh2,7); ctx.stroke(); }
        ctx.fillStyle = C.cream; ctx.textAlign = "center";
        ctx.fillText(m.badge, nx+bw2/2, ry+1.5);
        nx += bw2 + 22;
      }

      /* 品名 */
      ctx.textAlign = "left";
      ctx.font = serif(700, nameSize); ctx.fillStyle = C.inkGreen;
      ctx.fillText(m.name, nx, ry);
      const nw = ctx.measureText(m.name).width;

      /* 價格 */
      ctx.textAlign = "right";
      ctx.font = `500 ${nameSize*0.56}px "Noto Sans TC", sans-serif`;
      const unitW = ctx.measureText(" /杯").width;
      ctx.fillStyle = "#7a6c44";
      ctx.fillText("/杯", rxx, ry+4);
      ctx.font = serif(900, nameSize*0.92);
      ctx.fillStyle = C.red;
      const priceStr = "$" + m.price;
      ctx.fillText(priceStr, rxx - unitW, ry);
      const pwd = ctx.measureText(priceStr).width;

      /* 點點引線 */
      const dotA = nx + nw + 26, dotB = rxx - unitW - pwd - 26;
      if (dotB - dotA > 14){
        ctx.save();
        ctx.strokeStyle = "rgba(122,108,68,0.55)"; ctx.lineWidth = 2.5;
        ctx.setLineDash([1.2, 11]); ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(dotA, ry+8);
        ctx.lineTo(dotB, ry+8);
        ctx.stroke();
        ctx.restore();
      }

      /* 分隔線 */
      if (i < items.length-1){
        ctx.strokeStyle = "rgba(122,108,68,0.18)"; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ix+56, startY + rowH*(i+1));
        ctx.lineTo(ix+iw-56, startY + rowH*(i+1));
        ctx.stroke();
      }
    });
  }
  ctx.textAlign = "center";
  drawFooter();
}

/* ---- 公休版面 ---- */
function renderHoliday(){
  drawBase();
  drawLogo(420, 250);

  const cx = W/2;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";

  ctx.font = `italic 600 32px "Noto Serif TC", serif`;
  ctx.fillStyle = C.gold;
  ctx.fillText("Grandma A-Gui's Herbal Drinks", cx, 728);

  drawDivider(786, 250);

  ctx.font = serif(600, 40);
  ctx.fillStyle = "rgba(243,234,210,0.9)";
  ctx.fillText(dateText(), cx, 866);

  sealBanner("今 日 公 休", 1010, 104);

  /* 訊息米黃卡 */
  const msg = document.getElementById("inpHolidayMsg").value.trim() || "好好休息，養精蓄銳";
  const px = 130, pw = W - px*2;
  const lines = wrapLines(msg, 700, 46, pw - 110);
  const lineH = 76;
  const ph = Math.max(190, lines.length*lineH + 96);
  const py = 1170;
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,0.35)"; ctx.shadowBlur=20; ctx.shadowOffsetY=7;
  ctx.fillStyle = C.cream; rr(px,py,pw,ph,22); ctx.fill();
  ctx.restore();
  speckle(px,py,pw,ph,9876);
  ctx.strokeStyle = C.gold; ctx.lineWidth = 3.5; rr(px,py,pw,ph,22); ctx.stroke();
  ctx.strokeStyle = "rgba(163,42,34,0.55)"; ctx.lineWidth = 1.5; rr(px+10,py+10,pw-20,ph-20,14); ctx.stroke();

  ctx.font = serif(700, 46); ctx.fillStyle = C.inkGreen;
  const ty = py + ph/2 - (lines.length-1)*lineH/2;
  lines.forEach((l,i)=> ctx.fillText(l, cx, ty + i*lineH));

  drawFooter();
}

/* ---- 渲染與輸出 ---- */
let renderTimer = null, fontsLoaded = false;
function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 220);
}
async function render(){
  if (!fontsLoaded){
    try{
      await Promise.all([
        document.fonts.load('900 80px "Noto Serif TC"'),
        document.fonts.load('700 50px "Noto Serif TC"'),
        document.fonts.load('600 36px "Noto Serif TC"'),
        document.fonts.load('500 30px "Noto Sans TC"'),
        document.fonts.ready,
      ]);
    }catch(e){}
    fontsLoaded = true;
  }
  ctx.clearRect(0,0,W,H);
  (mode === "open" ? renderOpen : renderHoliday)();
  document.getElementById("previewImg").src = cv.toDataURL("image/png");
}

document.getElementById("btnDownload").addEventListener("click", ()=>{
  const a = document.createElement("a");
  const d = inpDate.value.replaceAll("-","");
  a.download = `阿桂嬤限動_${d}${mode==="holiday"?"_公休":""}.png`;
  a.href = cv.toDataURL("image/png");
  a.click();
});

render();
window.addEventListener("load", scheduleRender);
</script>
